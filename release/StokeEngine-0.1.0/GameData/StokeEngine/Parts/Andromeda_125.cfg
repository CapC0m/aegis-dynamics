+PART[HeatShield1]:BEFORE[StockWaterfallEffects]
{
    @name = stokeAndromeda125
    @title = Andromeda 1.25m
    @manufacturer = Stoke-Analog Industries
    @description = Ring of thrust chambers around a regen-cooled heatshield. 1.25m variant.

    @category = Engine
    @tags = engine rocket heatshield stoke andromeda

    @mass = 0.6
    @cost = 1800
    @entryCost = 8000
    @TechRequired = advRocketry
    @attachRules = 1,1,1,0,0
    @fuelCrossFeed = True

    @maxTemp = 2400
    @skinMaxTemp = 3300
    @emissiveConstant = 0.9
    @thermalMassModifier = 2.0



    // Strip heatshield-specific modules we dont want
    !MODULE[ModuleAblator] {}
    !MODULE[ModuleColorChanger] {}
    !MODULE[ModuleDecouple] {}
    !MODULE[ModuleLiftingSurface] {}
    !MODULE[ModuleSurfaceFX] {}
    !RESOURCE[Ablator] {}

    MODULE
    {
        name = ModuleStokeRingEngine
        chamberCount = 6
        ringRadius = 0.45
        nozzleOffsetY = 0
        thrustPerChamber = 20
        minThrottleFrac = 0.4

        engineID = stokeAndromedaEngine
        thrustVectorTransformName = stokeChamberTransform
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 120
        heatProduction = 200
        EngineType = LiquidFuel

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
        atmosphereCurve
        {
            key = 0 370
            key = 1 300
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = stokeAndromedaFX
        engineID = stokeAndromedaEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = stokeAndromedaEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-hydrolox-aerospike
            overrideParentTransform = stokeChamberTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.1, 0.1, 0.1
        }
    }
}