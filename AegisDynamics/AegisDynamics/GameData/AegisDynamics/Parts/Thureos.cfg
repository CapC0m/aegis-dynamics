+PART[HeatShield3]:BEFORE[StockWaterfallEffects]
{
    @name = aegisThureos
    @title = Thureos (3.75m)
    @manufacturer = Aegis Dynamics
    @description = Ring of thrust chambers around a regen-cooled heatshield. 3.75m variant.

    @category = Engine
    @tags = engine rocket heatshield aegis thureos stoke andromeda

    @mass = 6.5
    @cost = 28000
    @entryCost = 95000
    @TechRequired = veryHeavyRocketry
    @attachRules = 1,1,1,0,0
    @fuelCrossFeed = True

    @maxTemp = 2400
    @skinMaxTemp = 3300
    @emissiveConstant = 0.9
    @thermalMassModifier = 2.0

    @node_stack_top = 0.0, 0.17, 0.0, 0.0, 1.0, 0.0, 3

    !MODULE[ModuleAblator] {}
    !MODULE[ModuleColorChanger] {}
    !MODULE[ModuleDecouple] {}
    !MODULE[ModuleLiftingSurface] {}
    !MODULE[ModuleSurfaceFX] {}
    !RESOURCE[Ablator] {}

    MODULE
    {
        name = ModuleAegisRingEngine
        chamberCount = 18
        ringRadius = 1.7
        nozzleOffsetY = 0
        thrustPerChamber = 65
        minThrottleFrac = 0.4

        engineID = aegisThureosEngine
        thrustVectorTransformName = aegisChamberTransform
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 900
        heatProduction = 200
        EngineType = LiquidFuel

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
        atmosphereCurve
        {
            key = 0 350
            key = 1 280
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = aegisThureosFX
        engineID = aegisThureosEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = aegisThureosEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-hydrolox-aerospike
            overrideParentTransform = aegisChamberTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.3, 0.3, 0.3
        }
    }
}