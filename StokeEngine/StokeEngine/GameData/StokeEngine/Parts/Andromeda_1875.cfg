+PART[HeatShield2]:BEFORE[StockWaterfallEffects]
{
    @name = stokeAndromeda1875
    @title = Andromeda 1.875m
    @manufacturer = Stoke-Analog Industries
    @description = Ring of thrust chambers around a regen-cooled heatshield. 1.875m variant.

    @category = Engine
    @tags = engine rocket heatshield stoke andromeda

    // Rescale the shield to 1.875m
    @rescaleFactor = 0.75

    @mass = 0.85
    @cost = 3000
    @entryCost = 12000
    @TechRequired = advRocketry
    @attachRules = 1,1,1,0,0
    @fuelCrossFeed = True
    @bulkheadProfiles = size1p5

    @maxTemp = 2400
    @skinMaxTemp = 3300
    @emissiveConstant = 0.9
    @thermalMassModifier = 2.0

    @node_stack_top = 0.0, 0.125, 0.0, 0.0, 1.0, 0.0, 2

    !MODULE[ModuleAblator] {}
    !MODULE[ModuleColorChanger] {}
    !MODULE[ModuleDecouple] {}
    !MODULE[ModuleLiftingSurface] {}
    !MODULE[ModuleSurfaceFX] {}
    !MODULE[ModuleTestSubject] {}
    !MODULE[ModuleCargoPart] {}
    !RESOURCE[Ablator] {}

    MODULE
    {
        name = ModuleStokeRingEngine
        chamberCount = 9
        ringRadius = 1
        nozzleOffsetY = 0
        thrustPerChamber = 22
        minThrottleFrac = 0.4

        engineID = stokeAndromedaEngine
        thrustVectorTransformName = stokeChamberTransform
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 198
        heatProduction = 200
        EngineType = LiquidFuel

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
        atmosphereCurve
        {
            key = 0 370
            key = 1 300
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = stokeAndromedaFX
        engineID = stokeAndromedaEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = stokeAndromedaEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-hydrolox-aerospike
            overrideParentTransform = stokeChamberTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.12, 0.12, 0.12
        }
    }
}