+PART[HeatShield3]:BEFORE[StockWaterfallEffects]
{
    @name = aegisScutum
    @title = Scutum (5m)
    @manufacturer = Aegis Dynamics
    @description = Ring of thrust chambers around a regen-cooled heatshield. 5m variant.

    @category = Engine
    @tags = engine rocket heatshield aegis scutum stoke andromeda

    // Rescale the shield from 3.75m to 5m
    @rescaleFactor = 1.333

    @mass = 10
    @cost = 52000
    @entryCost = 180000
    @TechRequired = veryHeavyRocketry
    @attachRules = 1,1,1,0,0
    @fuelCrossFeed = True
    @bulkheadProfiles = size4

    @maxTemp = 2400
    @skinMaxTemp = 3300
    @emissiveConstant = 0.9
    @thermalMassModifier = 2.0

    @node_stack_top = 0.0, 0.17, 0.0, 0.0, 1.0, 0.0, 4

    !MODULE[ModuleAblator] {}
    !MODULE[ModuleColorChanger] {}
    !MODULE[ModuleDecouple] {}
    !MODULE[ModuleLiftingSurface] {}
    !MODULE[ModuleSurfaceFX] {}
    !MODULE[ModuleTestSubject] {}
    !MODULE[ModuleCargoPart] {}
    !RESOURCE[Ablator] {}

    MODULE
    {
        name = ModuleAegisActiveCooling
        fluxThreshold = 500
        coolingPerFuelUnit = 8000
        maxCoolingRate = 30000
        coolantResourceName = LiquidFuel
        oxidizerResourceName = Oxidizer
        fuelRatio = 0.9
        oxidizerRatio = 1.1
    } 

    MODULE
    {
        name = ModuleAegisRingEngine
        chamberCount = 24
        ringRadius = 1.7
        baseMass = 11.2
        massPerChamber = 0.1
        nozzleOffsetY = 0
        thrustPerChamber = 80
        minThrottleFrac = 0.4

        engineID = aegisScutumEngine
        thrustVectorTransformName = aegisChamberTransform
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 2880
        heatProduction = 200
        EngineType = LiquidFuel

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
        atmosphereCurve
        {
            key = 0 350
            key = 1 280
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = aegisScutumFX
        engineID = aegisScutumEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = aegisScutumEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-hydrolox-aerospike
            overrideParentTransform = aegisChamberTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.35, 0.35, 0.35
        }
    }
}