+PART[HeatShield1]:BEFORE[StockWaterfallEffects]
{
    @name = aegisAspis
    @title = Aspis (1.25m)
    @manufacturer = Aegis Dynamics
    @description = Ring of thrust chambers around a regen-cooled heatshield. 1.25m variant.

    @category = Engine
    @tags = engine rocket heatshield aegis aspis stoke andromeda

    @mass = 1.2
    @cost = 4500
    @entryCost = 18000
    @TechRequired = advRocketry
    @attachRules = 1,1,1,0,0
    @fuelCrossFeed = True

    @maxTemp = 2400
    @skinMaxTemp = 3300
    @emissiveConstant = 0.9
    @thermalMassModifier = 2.0

    // Strip heatshield-specific modules we dont want
    !MODULE[ModuleAblator] {}
    !MODULE[ModuleColorChanger] {}
    !MODULE[ModuleDecouple] {}
    !MODULE[ModuleLiftingSurface] {}
    !MODULE[ModuleSurfaceFX] {}
    !RESOURCE[Ablator] {}
    !MODULE[ModuleTestSubject] {}
    !MODULE[ModuleCargoPart] {}

    MODULE
    {
        name = ModuleAegisRingEngine
        chamberCount = 6
        ringRadius = 0.57
        nozzleOffsetY = 0
        thrustPerChamber = 10
        minThrottleFrac = 0.4

        engineID = aegisAspisEngine
        thrustVectorTransformName = aegisChamberTransform
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 120
        heatProduction = 200
        EngineType = LiquidFuel

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
        atmosphereCurve
        {
            key = 0 350
            key = 1 280
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = aegisAspisFX
        engineID = aegisAspisEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = aegisAspisEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-hydrolox-aerospike
            overrideParentTransform = aegisChamberTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.1, 0.1, 0.1
        }
    }
}