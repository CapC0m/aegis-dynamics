+PART[HeatShield3]:FOR[AegisDynamics]
{
    @name = aegisThureos
    @title = Aegis Thureos
    @manufacturer = Aegis Dynamics
    @description = Regen-cooled heatshield engine with gimbal TVC. Adjustable chamber count, scalable from 1.25m to 7.5m via TweakScale.

    @category = Engine
    @tags = engine rocket heatshield aegis thureos stoke andromeda

    @mass = 6.5
    @cost = 28000
    @entryCost = 95000
    @TechRequired = veryHeavyRocketry
    @attachRules = 1,1,1,0,0
    @fuelCrossFeed = True

    @maxTemp = 1700
    @skinMaxTemp = 1700
    @emissiveConstant = 0.9
    @thermalMassModifier = 1

    @node_stack_top = 0.0, 0.17, 0.0, 0.0, 1.0, 0.0, 3

    !MODULE[ModuleAblator] {}
    !MODULE[ModuleColorChanger] {}
    !MODULE[ModuleDecouple] {}
    !MODULE[ModuleLiftingSurface] {}
    !MODULE[ModuleSurfaceFX] {}
    !RESOURCE[Ablator] {}

    MODULE
    {
        name = ModuleAegisActiveCooling
        fluxThreshold = 500
        coolingPerFuelUnit = 10000
        maxCoolingRate = 20000
        coolantResourceName = LiquidFuel
        oxidizerResourceName = Oxidizer
        fuelRatio = 0.9
        oxidizerRatio = 1.1
    }

    MODULE
    {
        name = ModuleAegisRingEngine
        chamberCount = 18
        ringRadius = 1.7
        baseMass = 5.6
        massPerChamber = 0.1
        nozzleOffsetY = 0
        thrustPerChamber = 60
        gimbalThrustPenalty = 0.10

        engineID = aegisThureosEngine
        thrustVectorTransformName = aegisChamberTransform
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 1620
        heatProduction = 200
        EngineType = LiquidFuel

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
        atmosphereCurve
        {
            key = 0 350
            key = 1 280
        }
    }

    MODULE
    {
        name = ModuleGimbal
        gimbalTransformName = aegisGimbalAnchor
        gimbalRange = 5
        useGimbalResponseSpeed = true
        gimbalResponseSpeed = 12
        enablePitch = true
        enableYaw = true
        enableRoll = false
    }

    EFFECTS:NEEDS[!Waterfall]
    {
        running_thrust
        {
            AUDIO
            {
                channel = Ship
                clip = sound_rocket_hard
                volume = 0.0 0.0
                volume = 1.0 1.0
                pitch = 0.0 0.2
                pitch = 1.0 1.0
                loop = true
            }
            MODEL_MULTI_PARTICLE
            {
                modelName = Squad/FX/LesXSparks
                transformName = aegisPlumeTransform
                emission = 0.0 0.0
                emission = 0.05 0.0
                emission = 0.075 0.5
                emission = 1.0 1.0
                speed = 0.0 0.5
                speed = 1.0 1.5
                localOffset = 0, 0, 0
                localScale = 1.0, 1.0, 1.0
            }
        }

        engage
        {
            AUDIO
            {
                channel = Ship
                clip = sound_vent_soft
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }

        flameout
        {
            PREFAB_PARTICLE
            {
                prefabName = fx_exhaustSparks_flameout_2
                transformName = aegisPlumeTransform
                oneShot = true
            }
            AUDIO
            {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = aegisThureosFX
        engineID = aegisThureosEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = aegisThureosEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-hydrolox-aerospike
            overrideParentTransform = aegisPlumeTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.3, 0.3, 0.3
        }
    }

    MODULE
    {
        name = TweakScale
        type = stack
        defaultScale = 3.75
        scaleFactors = 1.25, 1.875, 2.5, 3.75, 5.0, 7.5
        scaleNames = 1.25m, 1.875m, 2.5m, 3.75m, 5.0m, 7.5m
    }
}

@PART[aegisThureos]:NEEDS[!Waterfall]:AFTER[AegisDynamics]
{
    EFFECTS
    {
        running_thrust
        {
            AUDIO
            {
                channel = Ship
                clip = sound_rocket_hard
                volume = 0.0 0.0
                volume = 1.0 1.0
                pitch = 0.0 0.2
                pitch = 1.0 1.0
                loop = true
            }
            MODEL_MULTI_PARTICLE
            {
                modelName = Squad/FX/shockExhaust_blue_small
                transformName = aegisPlumeTransform
                emission = 0.0 0.0
                emission = 0.0001 0.0025
                emission = 0.075 0.25
                emission = 1.0 1.25
                speed = 0.0 0.3
                speed = 1.0 1.2
                localPosition = 0, 0, -0.2
            }
        }

        engage
        {
            AUDIO
            {
                channel = Ship
                clip = sound_vent_soft
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }

        flameout
        {
            PREFAB_PARTICLE
            {
                prefabName = fx_exhaustSparks_flameout_2
                transformName = aegisPlumeTransform
                oneShot = true
            }
            AUDIO
            {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 2.0
                loop = false
            }
        }
    }

    @MODULE[ModuleAegisRingEngine]
    {
        runningEffectName = running_thrust
        engageEffectName = engage
        flameoutEffectName = flameout
    }
}