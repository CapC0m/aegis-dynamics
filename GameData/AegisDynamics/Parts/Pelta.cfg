+PART[HeatShield2]:BEFORE[StockWaterfallEffects]
{
    @name = aegisPelta
    @title = Pelta (1.875m)
    @manufacturer = Aegis Dynamics
    @description = Ring of thrust chambers around a regen-cooled heatshield. 1.875m variant.

    @category = Engine
    @tags = engine rocket heatshield aegis pelta stoke andromeda

    // Rescale the shield to 1.875m
    @rescaleFactor = 0.75

    @mass = 2.5
    @cost = 7800
    @entryCost = 32000
    @TechRequired = advRocketry
    @attachRules = 1,1,1,0,0
    @fuelCrossFeed = True
    @bulkheadProfiles = size1p5

    @maxTemp = 2400
    @skinMaxTemp = 3300
    @emissiveConstant = 0.9
    @thermalMassModifier = 2.0

    @node_stack_top = 0.0, 0.125, 0.0, 0.0, 1.0, 0.0, 2

    !MODULE[ModuleAblator] {}
    !MODULE[ModuleColorChanger] {}
    !MODULE[ModuleDecouple] {}
    !MODULE[ModuleLiftingSurface] {}
    !MODULE[ModuleSurfaceFX] {}
    !MODULE[ModuleTestSubject] {}
    !MODULE[ModuleCargoPart] {}
    !RESOURCE[Ablator] {}

    MODULE
    {
        name = ModuleAegisActiveCooling
        fluxThreshold = 500
        coolingPerFuelUnit = 8000
        maxCoolingRate = 4000
        coolantResourceName = LiquidFuel
        oxidizerResourceName = Oxidizer
        fuelRatio = 0.9
        oxidizerRatio = 1.1
    } 

    MODULE
    {
        name = ModuleAegisRingEngine
        chamberCount = 9
        ringRadius = 1.15
        baseMass = 1.8
        massPerChamber = 0.1
        nozzleOffsetY = 0
        thrustPerChamber = 40
        minThrottleFrac = 0.4

        engineID = aegisPeltaEngine
        thrustVectorTransformName = aegisChamberTransform
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 540
        heatProduction = 200
        EngineType = LiquidFuel

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
        atmosphereCurve
        {
            key = 0 350
            key = 1 280
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = aegisPeltaFX
        engineID = aegisPeltaEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = aegisPeltaEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-hydrolox-aerospike
            overrideParentTransform = aegisChamberTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.12, 0.12, 0.12
        }
    }
}