@PART[aegisAspis|aegisPelta|aegisHoplon|aegisThureos|aegisScutum]:NEEDS[CryoTanks]:FINAL
{
    @MODULE[ModuleAegisRingEngine]
    {
        !PROPELLANT,* {}
        PROPELLANT
        {
            name = LqdHydrogen
            ratio = 15
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 450
            key = 1 380
        }
    }
    
    @MODULE[ModuleAegisActiveCooling]
    {
        @coolantResourceName = LqdHydrogen
        @oxidizerResourceName = Oxidizer
        @fuelRatio = 15
        @oxidizerRatio = 1
    }
}

@PART[aegisChamber]:NEEDS[CryoTanks]:FINAL
{
    @MODULE[ModuleEnginesFX]
    {
        !PROPELLANT,* {}
        PROPELLANT
        {
            name = LqdHydrogen
            ratio = 15
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1
        }
        !atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 450
            key = 1 380
        }
    }
}